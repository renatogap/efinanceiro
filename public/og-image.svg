<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00412d"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <radialGradient id="glowTR" cx="95%" cy="5%" r="40%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="5%" cy="95%" r="30%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glowTR)"/>
  <rect width="1200" height="630" fill="url(#glowBL)"/>

  <!-- Decorative rings -->
  <circle cx="1110" cy="75" r="190" fill="none" stroke="#2dd4bf" stroke-opacity="0.10" stroke-width="1.5"/>
  <circle cx="1110" cy="75" r="120" fill="none" stroke="#2dd4bf" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="75"   cy="565" r="110" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Vertical separator -->
  <line x1="390" y1="95" x2="390" y2="535" stroke="#2dd4bf" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- ===== ICON (original 62×62 scaled 3.55×, center at 200,315) ===== -->
  <g transform="translate(90,205) scale(3.55)">
    <circle cx="31" cy="31" r="30" fill="rgba(255,255,255,0.10)" stroke="rgba(45,212,191,0.45)" stroke-width="1.5"/>
    <!-- Telhado -->
    <path d="M31 9 L9 25 L53 25 Z" fill="rgba(45,212,191,0.75)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <!-- Corpo da casa -->
    <rect x="13" y="25" width="36" height="18" rx="2.5" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
    <!-- Barras do gráfico -->
    <rect x="17" y="33" width="5" height="10" rx="1.5" fill="rgba(45,212,191,0.9)"/>
    <rect x="24" y="28" width="5" height="15" rx="1.5" fill="rgba(255,255,255,0.85)"/>
    <rect x="31" y="30" width="5" height="13" rx="1.5" fill="rgba(45,212,191,0.7)"/>
    <rect x="38" y="25" width="5" height="18" rx="1.5" fill="rgba(255,255,255,0.65)"/>
    <!-- Família -->
    <circle cx="18" cy="50" r="3.5" fill="rgba(255,255,255,0.78)"/>
    <path d="M14 56 Q18 53 22 56" stroke="rgba(255,255,255,0.78)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <circle cx="31" cy="51" r="2.7" fill="rgba(45,212,191,0.88)"/>
    <path d="M27.5 56 Q31 53.5 34.5 56" stroke="rgba(45,212,191,0.88)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <circle cx="44" cy="50" r="3.5" fill="rgba(255,255,255,0.78)"/>
    <path d="M40 56 Q44 53 48 56" stroke="rgba(255,255,255,0.78)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ===== TEXT CONTENT ===== -->

  <!-- Title -->
  <text
    x="440" y="285"
    font-family="Sora, -apple-system, Arial, sans-serif"
    font-weight="800"
    font-size="90"
    fill="#ffffff"
    letter-spacing="-2"
  >eFinanceiro</text>

  <!-- Teal accent bar -->
  <rect x="440" y="302" width="192" height="5" rx="2.5" fill="#2dd4bf" fill-opacity="0.9"/>

  <!-- Subtitle line 1 -->
  <text
    x="440" y="380"
    font-family="Manrope, -apple-system, Arial, sans-serif"
    font-weight="500"
    font-size="37"
    fill="#ffffff"
    fill-opacity="0.82"
  >Controle suas finanças</text>

  <!-- Subtitle line 2 -->
  <text
    x="440" y="428"
    font-family="Manrope, -apple-system, Arial, sans-serif"
    font-weight="500"
    font-size="37"
    fill="#ffffff"
    fill-opacity="0.82"
  >na palma da mão.</text>

  <!-- Pill: Receitas -->
  <rect x="440" y="468" width="164" height="44" rx="22" fill="#047857" fill-opacity="0.70" stroke="#2dd4bf" stroke-opacity="0.30" stroke-width="1.5"/>
  <text x="522" y="497" font-family="Manrope, Arial, sans-serif" font-size="23" fill="#ffffff" font-weight="600" text-anchor="middle">Receitas</text>

  <!-- Pill: Despesas -->
  <rect x="618" y="468" width="180" height="44" rx="22" fill="#b91c1c" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5"/>
  <text x="708" y="497" font-family="Manrope, Arial, sans-serif" font-size="23" fill="#ffffff" font-weight="600" text-anchor="middle">Despesas</text>

  <!-- Pill: Saldo -->
  <rect x="812" y="468" width="140" height="44" rx="22" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
  <text x="882" y="497" font-family="Manrope, Arial, sans-serif" font-size="23" fill="#ffffff" font-weight="600" text-anchor="middle">Saldo</text>
</svg>
